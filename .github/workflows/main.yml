name: React CI/CD to Tencent Cloud

# 触发条件：当向 main 分支推送代码时触发（可根据实际分支名修改，如 master）
on:
  push:
    branches:
      - main

# 定义任务
jobs:
  build-and-deploy:
    # 运行环境：使用最新的 Ubuntu 系统
    runs-on: ubuntu-latest

    steps:
      # 检出代码
      # 将 GitHub 仓库的代码下载到运行器中
      - name: Checkout Repository
        uses: actions/checkout@v6

      # 设置 Node.js 环境
      # 使用最新的 Node.js 版本，并配置 pnpm 作为包管理器
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'latest' # 使用最新 Node 版本，生产环境建议指定具体 LTS 版本如 '20'
          package-manager: 'pnpm' # 启用 pnpm 支持
          cache: 'pnpm' # 开启 pnpm 缓存，加速依赖安装

      # 安装 pnpm 包管理器
      # 使用官方 pnpm-setup action（推荐）
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 'latest'  # 指定 pnpm 版本，或使用 'latest'

      # 安装依赖
      # 使用 pnpm 安装项目依赖
      - name: Install Dependencies
        run: pnpm install

      # 构建项目
      # 执行构建命令，生成 dist 或 build 目录
      - name: Build Project
        run: pnpm run build
        # 注意：如果您的构建输出目录是 'build' 而不是 'dist'，请相应修改后续步骤中的路径
